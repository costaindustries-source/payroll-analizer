[project]
name = "payroll-cli"
version = "0.1.0"
description = "CLI operativa (host) per payroll-analizer: setup, update, backup/restore, release, manutenzione."
requires-python = ">=3.11"
dependencies = [
    "typer>=0.26.8",
    "rich>=13.9",
    "tomli-w>=1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/payroll_cli"]

[project.scripts]
payroll = "payroll_cli.main:app"
