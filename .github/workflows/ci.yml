name: CI

# Regressioni non intercettate automaticamente prima del merge/release (issue
# GH #16): il gate automatico esisteva solo dentro `payroll release new`
# (smoke test obbligatorio prima di taggare, v. docs/RELEASE_PROCESS.md), ma i
# commit intermedi su main tra una release e l'altra non erano protetti.
#
# Lo smoke test "vero" su docs/payroll-test/*.pdf NON gira qui: sono cedolini
# reali con CF/importi retributivi veri, gitignored e vietati su GitHub per
# regola esplicita (v. docs/RELEASE_PROCESS.md, "Dati reali: mai su GitHub").
# Resta un gate locale/di release. Qui gira la suite pytest in tests/
# (fixture sintetiche, issue GH #17), che copre le stesse regressioni note
# (destination path, corruzione font) senza dati reali.
#
# Gate di coverage per-file >=80% (non solo aggregato, v. scripts/check_coverage.py):
# ogni nuovo sviluppo su questo repo richiede test con questa soglia. Il
# service container Postgres serve alla fixture `db_session`/`db_engine` di
# tests/conftest.py (schema isolato usa-e-getta, mai dati reali).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.6-alpine
        env:
          POSTGRES_USER: payroll
          POSTGRES_PASSWORD: payroll
          POSTGRES_DB: payroll
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payroll"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Installa uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.15"

      - name: Installa Python
        run: uv python install

      - name: Sincronizza dipendenze
        run: uv sync --all-packages

      - name: Suite pytest + coverage
        env:
          TEST_DATABASE_URL: postgresql+psycopg://payroll:payroll@localhost:5432/payroll
        run: uv run pytest -v --cov=payroll_ingest --cov=payroll_cli --cov-report=term-missing

      - name: Gate coverage per-file (>=80%)
        run: uv run python scripts/check_coverage.py
